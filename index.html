<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGAE · Recursos IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#021a19;
--sidebar:#042f2e;
--accent:#5eead4;
--hover:#0d9488;
--text:#e2e8f0;
--muted:#94a3b8;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:'Inter',sans-serif;
display:flex;
height:100vh;
background:#0f172a;
}

/* SIDEBAR */
.sidebar{
width:280px;
background:var(--sidebar);
color:var(--text);
padding:24px 20px;
display:flex;
flex-direction:column;
}

.brand{
font-size:1.2rem;
font-weight:700;
color:var(--accent);
margin-bottom:30px;
letter-spacing:.05em;
}

.menu a{
display:flex;
align-items:center;
gap:12px;
padding:12px 14px;
border-radius:12px;
color:var(--text);
text-decoration:none;
font-size:.95rem;
margin-bottom:8px;
transition:.2s;
}

.menu a span{
font-size:1.1rem;
}

.menu a:hover{
background:rgba(94,234,212,.15);
}

.menu a.active{
background:linear-gradient(135deg,#0d9488,#0891b2);
color:#042f2e;
font-weight:600;
}

/* FOOTER */
.sidebar-footer{
margin-top:auto;
font-size:.7rem;
color:var(--muted);
opacity:.8;
}

/* CONTENT */
.content{
flex:1;
background:#f1f5f9;
position:relative;
}

iframe{
width:100%;
height:100%;
border:none;
background:white;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="brand">🎓 SGAE · IA EDU</div>

<nav class="menu">
<a href="#" class="active" onclick="loadPage('escape.html',this)">🔐 Escape Room</a>
<a href="#" onclick="loadPage('insectos.html',this)">🐞 Insectos</a>
<a href="#" onclick="loadPage('index.html',this)">🏠 Inicio</a>
</nav>

<div class="sidebar-footer">
Jornada IA · Comunitat Valenciana<br>
CEFIRE · 2026
</div>
</div>

<div class="content">
<iframe id="viewer" src="escape.html"></iframe>
</div>

<script>
function loadPage(page, el){
document.getElementById('viewer').src = page;
document.querySelectorAll('.menu a').forEach(a=>a.classList.remove('active'));
el.classList.add('active');
}
</script>

</body>
</html>
